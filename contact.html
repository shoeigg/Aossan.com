<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT｜Aossan Motors</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header">
    <div class="header__logo"><a href="index.html">AOSSAN MOTORS</a></div>
    <nav class="header__nav">
      <a href="lineup.html">クルマを探す</a>
      <a href="support.html">オーナーの方へ</a>
      <a href="detail.html">Aossanを知る</a>
    </nav>
    <div class="header__controls">
      <div class="hamburger"><span></span><span></span><span></span></div>
    </div>
  </header>

  <div class="page-header">
    <h1>CONTACT</h1>
  </div>

  <section class="section container fade-in">
    <div style="max-width: 800px; margin: 0 auto; background: var(--color-white); border: 1px solid var(--color-border); padding: 50px;">
      <h2 style="font-size: 24px; font-weight: 700; margin-bottom: 30px; border-bottom: 2px solid var(--color-red); padding-bottom: 15px;">お問い合わせフォーム</h2>
      <form action="#" method="POST" onsubmit="event.preventDefault(); alert('送信しました');">
        <div class="grid-2" style="gap: 20px;">
          <div class="form-group"><label>氏名</label><input type="text" required></div>
          <div class="form-group"><label>フリガナ</label><input type="text" required></div>
        </div>
        <div class="form-group"><label>メールアドレス</label><input type="email" required></div>
        <div class="form-group"><label>お問い合わせ内容</label><textarea rows="6" required></textarea></div>
        <div style="text-align: center; margin-top: 40px;">
          <button type="submit" class="btn">送信する</button>
        </div>
      </form>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-grid">
      <div class="footer-col">
        <h4>企業情報</h4><ul><li><a href="#">会社概要</a></li></ul>
      </div>
      <div class="footer-col">
        <h4>サポート</h4><ul><li><a href="support.html">よくあるご質問</a></li></ul>
      </div>
      <div class="footer-col">
        <h4>購入関連</h4><ul><li><a href="lineup.html">カタログ請求</a></li></ul>
      </div>
      <div class="footer-col">
        <h4>公式SNSアカウント</h4><ul><li><a href="#">YouTube</a></li></ul>
      </div>
    </div>
    <div class="footer__bottom">
      <p>&copy; 2026 Aossan Motors. All Rights Reserved.</p>
    </div>
  </footer>
  <script src="main.js"></script>
</body>
</html>
